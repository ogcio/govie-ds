trigger: none

pr:
  autoCancel: true
  branches:
    include:
      - main
  paths:
    include:
      - .azure/visual-regression.yaml
      - packages/react
      - packages/html/ds
      - packages/design/tailwind
      - packages/design/tokens

parameters:
  - name: vmImage
    type: string
    default: ubuntu-24.04
  - name: nodeVersion
    type: string
    default: "24.x"
  - name: pnpmVersion
    type: string
    default: "10.33.0"

variables:
  - template: pipeline-variables/shared-services.yaml

resources:
  repositories:
    - repository: pipeline-templates
      type: github
      endpoint: ogcio
      name: ogcio/building-blocks-pipelines
      ref: refs/tags/v0.14.1

stages:
  - stage: ChromaticHTML
    displayName: Chromatic for HTML Library
    dependsOn: []
    pool:
      vmImage: ${{ parameters.vmImage }}
    jobs:
      - job: ChromaticDeploy
        displayName: Build and Upload Chromatic
        steps:
          - checkout: self
            displayName: Get Full Git History
            fetchDepth: 0

          - template: tools/install-pnpm.yml@pipeline-templates
            parameters:
              nodeVersion: ${{ parameters.nodeVersion }}
              pnpmVersion: ${{ parameters.pnpmVersion }}

          - script: pnpm storybook:build:html
            displayName: Build HTML Storybook

          - script: npx chromatic --config-file packages/html/ds/chromatic.config.json
            displayName: Run Chromatic
            env:
              CHROMATIC_PROJECT_TOKEN: $(CHROMATIC_PROJECT_TOKEN_HTML)

  - stage: BuildReact
    displayName: Build React Storybook
    dependsOn: []
    pool:
      vmImage: ${{ parameters.vmImage }}
    jobs:
      - job: BuildReactStorybook
        displayName: Build React Storybook
        steps:
          - template: tools/install-pnpm.yml@pipeline-templates
            parameters:
              nodeVersion: ${{ parameters.nodeVersion }}
              pnpmVersion: ${{ parameters.pnpmVersion }}

          - script: pnpm storybook:build:react
            displayName: Build React Storybook

          - task: PublishPipelineArtifact@1
            displayName: Publish Storybook Static
            inputs:
              targetPath: $(System.DefaultWorkingDirectory)/packages/react/storybook-static
              artifact: react_storybook_static
              publishLocation: pipeline

  - stage: ChromaticReact
    displayName: Chromatic for React Library
    dependsOn: BuildReact
    pool:
      vmImage: ${{ parameters.vmImage }}
    jobs:
      - job: ChromaticDeploy
        displayName: Upload to Chromatic
        steps:
          - checkout: self
            displayName: Get Full Git History
            fetchDepth: 0

          - template: tools/install-pnpm.yml@pipeline-templates
            parameters:
              nodeVersion: ${{ parameters.nodeVersion }}
              pnpmVersion: ${{ parameters.pnpmVersion }}

          - task: DownloadPipelineArtifact@2
            displayName: Download Storybook Static
            inputs:
              buildType: current
              artifactName: react_storybook_static
              targetPath: $(System.DefaultWorkingDirectory)/packages/react/storybook-static

          - script: npx chromatic --config-file packages/react/chromatic.config.json
            displayName: Run Chromatic
            env:
              CHROMATIC_PROJECT_TOKEN: $(CHROMATIC_PROJECT_TOKEN_REACT)

  - stage: Playwright
    displayName: Playwright for React Library
    dependsOn: BuildReact
    jobs:
      - job: PlaywrightTest
        displayName: Run Playwright Tests
        pool:
          vmImage: ${{ parameters.vmImage }}
        container: ${{ variables.playwrightImage }}
        strategy:
          matrix:
            chromium:
              project: chromium
            firefox:
              project: firefox
            webkit:
              project: webkit
            android:
              project: android
            iphone:
              project: iphone
        steps:
          - template: tools/install-pnpm.yml@pipeline-templates
            parameters:
              nodeVersion: ${{ parameters.nodeVersion }}
              pnpmVersion: ${{ parameters.pnpmVersion }}

          - task: DownloadPipelineArtifact@2
            displayName: Download Storybook Static
            inputs:
              buildType: current
              artifactName: react_storybook_static
              targetPath: $(System.DefaultWorkingDirectory)/packages/react/storybook-static

          - script: |
              cd packages/react
              pnpm playwright test --project=$(project)
            displayName: Run Playwright Tests
            env:
              CI: "true"

          - task: PublishTestResults@2
            displayName: Publish Test Results
            inputs:
              searchFolder: $(System.DefaultWorkingDirectory)/packages/react/test-results
              testResultsFormat: JUnit
              testResultsFiles: results.xml
              testRunTitle: Playwright Tests
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: Publish Test Results Artifact
            inputs:
              targetPath: $(System.DefaultWorkingDirectory)/packages/react/test-results
              artifact: $(project)
              publishLocation: pipeline
            condition: succeededOrFailed()
