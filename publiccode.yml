description:
  en:
    localisedName: Government of Ireland Design System
    shortDescription: An open-source design system providing tools and guidelines
      to create consistent, accessible, and user-centred government digital
      services.
    longDescription: The Government of Ireland Design System is an open-source
      design system developed by the Office of the Government Chief Information
      Officer (OGCIO). It provides tools for design and development, along with
      resources and guidelines to help teams create consistent, accessible, and
      user-centred digital services across government.
    documentation: https://ds.services.gov.ie/
    screenshots:
      - assets/docs/fig_cover.png
    features:
      - React component library
      - HTML component library
      - Angular component library (alpha)1
      - Tailwind CSS styling and theming
      - Design tokens for consistent styling
      - Theme packages
      - Figma design resources
      - WCAG 2.1 AA accessible components
